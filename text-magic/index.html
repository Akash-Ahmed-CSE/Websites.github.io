<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code Tool Suite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-title">CodeCompare</a>
    <a href="word-counter.html" class="navbar-link">Word Counter & Generatate</a>
  </nav>

  <!-- Code Compare Section -->
  <div class="container">
    <h2>Code Comparison Tool</h2>
    <div class="editor-section">
      <div class="editor">
        <label for="code1">Original Code</label>
        <textarea id="code1" placeholder="Enter original code..."></textarea>
      </div>
      <div class="editor">
        <label for="code2">Modified Code</label>
        <textarea id="code2" placeholder="Enter modified code..."></textarea>
      </div>
    </div>
    <button onclick="compareCode()">Compare</button>
    <div id="result" class="result-section"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
