<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word Counter & Paragraph Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-title">CodeCompare</a>
    <a href="word-counter.html" class="navbar-link">Word Counter & Generatate</a>
  </nav>

  <!-- Word Counter Section -->
  <div class="container">
    <h2>Word Counter & Paragraph Generator</h2>

    <textarea 
      id="description" 
      class="form-control" 
      rows="7" 
      placeholder="Start typing or paste to begin..." 
      autocomplete="off"
      oninput="debounceCountAll()"
    ></textarea>

    <div class="status-bar">
      <div>Characters: <span id="charCount">0</span></div>
      <div>Words: <span id="wordCount">0</span></div>
      <div>Sentences: <span id="sentenceCount">0</span></div>
      <div>Paragraphs: <span id="paragraphCount">0</span></div>
      <div>Spaces: <span id="spaceCount">0</span></div>
    </div>

    <div class="generator-container">
      <input type="number" id="charLimit" placeholder="Enter character count" min="1" />
      <button onclick="generateParagraph()">Generate Paragraph</button>
      <button id="clearButton" onclick="clearFields()">Clear</button>
      <button id="copyButton" onclick="copyToClipboard()">Copy to Clipboard</button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
